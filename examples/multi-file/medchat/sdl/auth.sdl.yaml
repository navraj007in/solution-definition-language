auth:
  strategy: oidc
  provider: custom
  x-confidence: medium
  x-evidence: "Session-based auth is simpler for MVP and works well with SSO/SAML flows; JWT is an alternative but adds token revocation complexity for HIPAA"

  x-providersLegacy:
    primary:
      type: saml
      x-confidence: high
      x-evidence: "MVP scope M9 requires SAML 2.0 SSO; hospitals use Azure AD, Okta, PingFederate"
      supportedIdPs:
        - Azure AD
        - Okta
        - PingFederate
      configuration:
        metadataUrl: "per-organization SAML metadata URL"
        assertionConsumerService: "/api/v1/auth/saml/callback"
        signedRequests: true
        encryptedAssertions: true

    fallback:
      type: email-password
      x-confidence: high
      x-evidence: "MVP scope M9 specifies email/password fallback for hospitals without SSO"
      passwordPolicy:
        minLength: 12
        requireUppercase: true
        requireNumber: true
        requireSpecial: true
        maxAge: "90 days"

  mfa: true

  sessions:
    accessToken: opaque
    refreshToken: true
    ttl:
      access: 8h
      refresh: 7d

  roles:
    - clinician
    - department_admin
    - org_admin
    - compliance_officer

  x-providers:
    primary:
      type: saml
      supportedIdPs: [Azure AD, Okta, PingFederate]
      configuration:
        metadataUrl: "per-organization SAML metadata URL"
        assertionConsumerService: "/api/v1/auth/saml/callback"
        signedRequests: true
        encryptedAssertions: true
    fallback:
      type: email-password
      passwordPolicy:
        minLength: 12
        requireUppercase: true
        requireNumber: true
        requireSpecial: true
        maxAge: "90 days"
  x-mfa:
    required: configurable-per-org
    methods: [totp, push-based]
  x-sessionDetails:
    store: redis
    idleTimeout: "15 minutes (configurable by admin)"
    reAuthentication: "Biometric or PIN required after app backgrounding/lock screen"
    concurrentSessions: "Allowed (clinicians use mobile + desktop simultaneously)"
    revocation: "Immediate on account deactivation; all active sessions terminated"
  x-provisioning:
    manual: "Admin creates users via admin console"
    automated: "SCIM 2.0 for auto-provisioning from IdP"
    deprovisioning: "Account deactivation immediately revokes all sessions and access"
  x-rolesDetailed:
    clinician:
      permissions: [send_messages, read_own_conversations, search_directory, upload_files, manage_own_notifications]
    department_admin:
      permissions: [all_clinician_permissions, manage_department_schedule, view_department_analytics]
    org_admin:
      permissions: [all_department_admin_permissions, manage_users, manage_organization_settings, view_audit_trail, export_audit_data, manage_all_schedules, view_all_analytics]
    compliance_officer:
      permissions: [search_audit_trail, view_message_content_for_audit, export_audit_data]
  x-authorization:
    model: "Organization-scoped with role-based access"
    rules:
      - "Users can only access data within their organization"
      - "Users can only read messages in conversations they are members of"
      - "Admin actions are scoped to the admin's organization"
      - "Compliance officers can access message content only via audit trail interface"
      - "All authorization decisions are logged in audit trail"
