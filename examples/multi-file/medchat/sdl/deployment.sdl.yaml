deployment:
  cloud: aws
  x-confidence: high
  x-evidence: "intent.json specifies AWS; AWS has the most mature HIPAA BAA and eligible services"
  runtime:
    frontend: s3+cloudfront
    backend: ecs
  networking:
    publicApi: true
    waf: true
    ddos: true
    customDomain: true
  ciCd:
    provider: github-actions
  infrastructure:
    iac: terraform
    stateBacking: s3
  x-regions:
    primary: us-east-1
    failover: us-west-2
  x-strategy: containerized
  x-infrastructureDetails:
    compute:
      service: "AWS ECS Fargate"
      tasks:
        - name: medchat-api
          cpu: 1024
          memory: 2048
          desiredCount: 2
        - name: medchat-ws
          cpu: 512
          memory: 1024
          desiredCount: 2
          description: "WebSocket server (separate task for sticky sessions)"
    loadBalancer:
      service: "AWS ALB"
      features:
        - "Path-based routing (/api/* → API tasks, /ws/* → WebSocket tasks)"
        - "SSL termination with ACM certificate"
        - "WebSocket support with sticky sessions"
        - "WAF integration for OWASP protection"
    database:
      service: "AWS RDS PostgreSQL 16"
      instanceClass: "db.r6g.large"
      multiAZ: true
    cache:
      service: "AWS ElastiCache Redis 7"
      nodeType: "cache.r6g.large"
      clusterMode: true
    storage:
      service: "AWS S3"
      versioning: true
    cdn:
      service: "AWS CloudFront"
      purpose: "Static asset delivery for web app"
    secrets:
      service: "AWS Secrets Manager"
    monitoring:
      service: "AWS CloudWatch"
  x-environments:
    - name: development
      description: "Local development with Docker Compose"
    - name: staging
      description: "Pre-production environment mirroring production"
    - name: production
      description: "Live environment serving hospital customers"
  x-pipelines:
    - name: ci
      trigger: "Pull request to main"
    - name: deploy-staging
      trigger: "Merge to main"
    - name: deploy-production
      trigger: "Manual approval after staging validation"
