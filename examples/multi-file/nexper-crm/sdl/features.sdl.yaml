features:
  - name: Organisation Onboarding
    description: Create org, invite first users, configure billing via Stripe
    priority: critical
  - name: Contact Management
    description: CRUD for contacts with search, filters, and CSV import
    priority: critical
  - name: Deal Pipeline (Kanban)
    description: Pipeline with configurable stages and drag-and-drop deal cards
    priority: critical
  - name: Activity Logging
    description: Log calls, emails, meetings, and notes against contacts and deals
    priority: critical
  - name: Basic Reporting
    description: Pipeline summary and activity count dashboards
    priority: high
  - name: Stripe Billing
    description: Subscription management, plan upgrades, and invoice history
    priority: critical
  - name: AI Contact Scoring
    description: Async AI score per contact based on activity and enrichment
    priority: high
  - name: AI Deal Win Probability
    description: Real-time win probability badge on deal cards
    priority: high
  - name: AI Talk Track Generation
    description: On-demand talk track and objection handlers for a contact
    priority: medium
  - name: Gmail / Outlook Email Sync
    description: OAuth2 email sync that auto-logs messages to contacts
    priority: high
  - name: Webhook Delivery
    description: Customer-configurable webhooks for CRM events with HMAC signing
    priority: medium
  - name: In-App and Email Notifications
    description: "@mention notifications, deal updates, and task reminders"
    priority: medium
  - name: Data Export (CSV)
    description: Export contacts, deals, and activities with column selection
    priority: medium
  - name: SSO (SAML / OIDC)
    description: Enterprise SSO via Okta, Azure AD, and Google Workspace
    priority: high
  - name: Advanced Audit Logging
    description: Compliance-grade audit trail with export and retention controls
    priority: high
  - name: EU Data Residency
    description: Dedicated eu-west-1 deployment with data residency guarantees
    priority: high
  - name: Mobile App (iOS + Android)
    description: React Native app with contact lookup, activity logging, and deal updates
    priority: medium

x-featureRoadmap:
  phase1:
    name: MVP
    deadline: "2026-06-30"
  phase2:
    name: Growth
    deadline: "2026-10-31"
  phase3:
    name: Enterprise
  featureFlags:
    - name: ai_contact_scoring
      rollout: "25%"
      targetAudience: beta-users
      phase: phase2
    - name: ai_talk_track
      rollout: "0%"
      targetAudience: internal
      phase: phase2
    - name: email_sync_gmail
      rollout: "10%"
      targetAudience: early-access
      phase: phase2
    - name: new_kanban_ui
      rollout: "50%"
      targetAudience: all-users
      phase: phase2
