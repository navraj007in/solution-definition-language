sdlVersion: "1.1"
solution:
  name: "AIChatApp"
  description: "AI-powered chat application with LLM integration and conversation history"
  stage: "MVP"
product:
  personas:
    - name: "User"
      goals:
        - "Start conversations with AI"
        - "Upload documents for analysis"
        - "View conversation history"
    - name: "Admin"
      accessLevel: "admin"
      goals:
        - "Monitor usage and costs"
        - "Configure AI models"
        - "Manage API keys"
  coreFlows:
    - name: "AI Conversation"
      priority: "critical"
      steps:
        - "Start new chat"
        - "Send message"
        - "Receive streaming response"
        - "Continue conversation"
    - name: "Document Analysis"
      priority: "high"
      steps:
        - "Upload document"
        - "Wait for processing"
        - "Ask questions about document"
        - "Get AI-powered answers"
design:
  personality: "minimal"
  palette:
    primary: "emerald-500"
    secondary: "cyan-400"
    neutral: "zinc"
    surface: "dark"
  typography:
    heading: "Space Grotesk"
    body: "Inter"
    mono: "JetBrains Mono"
    scale: "compact"
  shape:
    radius: "sm"
    density: "compact"
    shadows: "flat"
    borders: "subtle"
  iconLibrary: "lucide"
  componentLibrary: "shadcn/ui"
architecture:
  style: "modular-monolith"
  projects:
    frontend:
      - name: "chat-ui"
        framework: "nextjs"
        rendering: "ssr"
        styling: "tailwind"
        stateManagement: "zustand"
    backend:
      - name: "agent-api"
        framework: "python-fastapi"
        apiStyle: "rest"
auth:
  strategy: "oidc"
  provider: "clerk"
  roles:
    - "user"
    - "admin"
  sessions:
    accessToken: "jwt"
    refreshToken: true
data:
  primaryDatabase:
    type: "postgres"
    hosting: "managed"
  cache:
    type: "redis"
    useCase:
      - "session"
      - "api"
  search:
    provider: "pinecone"
integrations:
  monitoring:
    provider: "sentry"
deployment:
  cloud: "railway"
  ciCd:
    provider: "github-actions"
nonFunctional:
  availability:
    target: "99.9"
  scaling:
    expectedUsersMonth1: 100
    expectedUsersYear1: 5000
  performance:
    apiResponseTime: "<500ms"
  security:
    pii: true
    encryptionAtRest: true
    encryptionInTransit: true
artifacts:
  generate:
    - "architecture-diagram"
    - "sequence-diagrams"
    - "openapi"
    - "data-model"
    - "repo-scaffold"
    - "backlog"
    - "adr"
    - "cost-estimate"
